name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        id: build
        run: |
          name=tplr-${{ matrix.goos }}-${{ matrix.goarch }}
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-X main.version=${GITHUB_REF_NAME}" -o $name$ext ./cmd/tplr
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${name}.zip $name$ext
            echo "artifact=${name}.zip" >> "$GITHUB_OUTPUT"
            rm $name$ext
          else
            tar -czf ${name}.tar.gz $name$ext
            echo "artifact=${name}.tar.gz" >> "$GITHUB_OUTPUT"
            rm $name$ext
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.artifact }}
          path: ${{ steps.build.outputs.artifact }}
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**

name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  # release-please tracks Conventional Commits on main, maintains a release PR
  # with the computed version bump and CHANGELOG, and on merge of that PR creates
  # the git tag and GitHub release.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # The dmoove org disallows GitHub Actions from creating pull requests, so
      # the default GITHUB_TOKEN cannot open the release PR. Provide a PAT (or
      # GitHub App token) as the RELEASE_PLEASE_TOKEN secret to work around this;
      # alternatively an org admin can enable "Allow GitHub Actions to create and
      # approve pull requests", after which GITHUB_TOKEN is sufficient.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  # A release created by release-please via GITHUB_TOKEN does not trigger a
  # separate tag-push workflow, so the binaries are built and attached here in
  # the same run, gated on a release actually having been created.
  upload-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        id: build
        run: |
          name=tplr-${{ matrix.goos }}-${{ matrix.goarch }}
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-X main.version=${{ needs.release-please.outputs.tag_name }}" -o $name$ext ./cmd/tplr
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${name}.zip $name$ext
            echo "artifact=${name}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf ${name}.tar.gz $name$ext
            echo "artifact=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} ${{ steps.build.outputs.artifact }} --clobber

  # Build and push multi-arch container images on a release. Pushes to GHCR
  # always (uses GITHUB_TOKEN); pushes to Docker Hub only when the DOCKERHUB_*
  # secrets are configured, otherwise that registry is skipped.
  docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Compute image tags
        id: meta
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          version="${TAG_NAME#v}"
          ghcr="ghcr.io/${GITHUB_REPOSITORY,,}"
          tags="${ghcr}:${version},${ghcr}:latest"
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            dh="docker.io/dmoove/tplr"
            tags="${tags},${dh}:${version},${dh}:latest"
            echo "dockerhub=true" >> "$GITHUB_OUTPUT"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        if: ${{ steps.meta.outputs.dockerhub == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: VERSION=${{ needs.release-please.outputs.tag_name }}
          sbom: true
          provenance: mode=max

  # Generate a source SBOM (SPDX, including Go module dependencies) and attach it
  # to the release.
  sbom:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: tplr-${{ needs.release-please.outputs.tag_name }}-sbom.spdx.json
      - name: Upload SBOM to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} tplr-${{ needs.release-please.outputs.tag_name }}-sbom.spdx.json --clobber

  # Update the Homebrew formula in the tap repository. Runs only when a
  # HOMEBREW_TAP_TOKEN secret with write access to dmoove/homebrew-tap is set,
  # otherwise the step is skipped (release stays green). Needs the release
  # archives, so it runs after upload-assets.
  homebrew:
    needs: [release-please, upload-assets]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap token
        id: gate
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "Homebrew tap token not set; skipping formula update."
          fi
      - uses: actions/checkout@v4
        if: ${{ steps.gate.outputs.enabled == 'true' }}
      - name: Render and push formula
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          export VERSION="${TAG#v}"
          export BASE="https://github.com/${REPO}/releases/download/${TAG}"
          tmp="$(mktemp -d)"
          for pair in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            f="tplr-${pair}.tar.gz"
            gh release download "${TAG}" --repo "${REPO}" --pattern "${f}" --dir "${tmp}"
            digest="$(sha256sum "${tmp}/${f}" | cut -d' ' -f1)"
            var="SHA_$(echo "${pair}" | tr 'a-z-' 'A-Z_')"
            export "${var}=${digest}"
          done

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/dmoove/homebrew-tap.git" "${tmp}/tap"
          mkdir -p "${tmp}/tap/Formula"
          envsubst < .github/homebrew/tplr.rb.tmpl > "${tmp}/tap/Formula/tplr.rb"
          cd "${tmp}/tap"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tplr.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
          else
            git commit -m "tplr ${VERSION}"
            git push
          fi
